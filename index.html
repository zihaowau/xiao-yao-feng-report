function renderPage(pageName) {
const main = document.getElementById('mainContent');
main.innerHTML = pages[pageName] || pages.import;
document.querySelectorAll('.sidebar-item').forEach(item => { item.classList.toggle('active', item.dataset.page === pageName); });
if (pageName === 'dashboard') { initDashboard(); }
else if (pageName === 'analysis') { initAnalysis(); }
else if (pageName === 'report') { initReport(); }
else if (pageName === 'import') { setTimeout(initUpload, 0); }
}

function initSidebar() {
document.querySelectorAll('.sidebar-item').forEach(item => { item.addEventListener('click', () => renderPage(item.dataset.page)); });
document.querySelectorAll('.header-menu-item').forEach(item => { item.addEventListener('click', () => { document.querySelectorAll('.header-menu-item').forEach(i => i.classList.remove('active')); item.classList.add('active'); const menu = item.dataset.menu; if (menu === 'data') renderPage('dashboard'); else if (menu === 'analysis') renderPage('analysis'); else if (menu === 'report') renderPage('report'); }); });
}

function initUpload() {
const zone = document.getElementById('uploadZone');
const input = document.getElementById('fileInput');
if (!zone) return;
zone.addEventListener('click', () => input.click());
zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', (e) => { e.preventDefault(); zone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
input.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });
}

function handleFile(file) {
const reader = new FileReader();
reader.onload = (e) => {
const data = new Uint8Array(e.target.result);
const workbook = XLSX.read(data, { type: 'array' });
const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
processImportedData(jsonData);
};
reader.readAsArrayBuffer(file);
}

function parsePastedData() {
const text = document.getElementById('pasteArea').value.trim();
if (!text) { alert('请先粘贴数据'); return; }
const rows = text.split('\n').map(row => row.split('\t'));
processImportedData(rows);
}

function processImportedData(rows) {
if (!rows || rows.length < 2) { alert('数据格式不正确'); return; }
const headers = rows[0].map(h => String(h).trim());
const data = [];
for (let i = 1; i < rows.length; i++) {
const row = rows[i];
if (row.length < 2) continue;
const item = {};
headers.forEach((h, idx) => { item[h] = row[idx] !== undefined ? String(row[idx]).trim() : ''; });
data.push(item);
}
appData.rawData = data;
appData.filteredData = [...data];
alert('成功导入 ' + data.length + ' 条数据！');
renderPage('dashboard');
}

function initDashboard() {
calculateStats();
initFilters();
renderTable();

function calculateStats() {
const data = appData.rawData;
const total = data.length;
const connected = data.filter(d => d['回访结果'] && d['回访结果'] !== '').length;
const resolved = data.filter(d => d['回访结果'] === '解决').length;
const phoneGroups = {};
data.forEach(d => { const key = d['回访手机号'] || d['运单号']; if (key) { phoneGroups[key] = (phoneGroups[key] || 0) + 1; } });
const repeatCount = Object.values(phoneGroups).filter(c => c > 1).reduce((sum, c) => sum + c, 0);
document.getElementById('statTotal').textContent = total;
document.getElementById('statConnected').textContent = connected;
document.getElementById('statConnectRate').textContent = '接通率 ' + (total ? ((connected/total)*100).toFixed(1) : 0) + '%';
document.getElementById('statResolved').textContent = resolved;
document.getElementById('statResolveRate').textContent = '解决率 ' + (connected ? ((resolved/connected)*100).toFixed(1) : 0) + '%';
document.getElementById('statRepeat').textContent = repeatCount;
document.getElementById('statRepeatRate').textContent = '重复进线率 ' + (total ? ((repeatCount/total)*100).toFixed(1) : 0) + '%';
}

function initFilters() {
const typeSet = new Set(appData.rawData.map(d => d['问题类型']).filter(Boolean));
const typeSelect = document.getElementById('filterType');
if (typeSelect) {
typeSet.forEach(type => { const opt = document.createElement('option'); opt.value = type; opt.textContent = type; typeSelect.appendChild(opt); });
}
}

function applyFilter() {
const type = document.getElementById('filterType').value;
const result = document.getElementById('filterResult').value;
const agent = document.getElementById('filterAgent').value;
const date = document.getElementById('filterDate').value;
appData.filteredData = appData.rawData.filter(d => {
if (type && d['问题类型'] !== type) return false;
if (result && d['回访结果'] !== result) return false;
if (agent && d['会话中介'] !== agent) return false;
if (date) { const dDate = new Date(d['日期']); const fDate = new Date(date); if (dDate.toDateString() !== fDate.toDateString()) return false; }
return true;
});
appData.currentPage = 1;
renderTable();
renderPagination();
}

function resetFilter() {
document.getElementById('filterType').value = '';
document.getElementById('filterResult').value = '';
document.getElementById('filterAgent').value = '';
document.getElementById('filterDate').value = '';
appData.filteredData = [...appData.rawData];
appData.currentPage = 1;
renderTable();
renderPagination();
}

function sortTable(field) {
if (appData.sortField === field) { appData.sortOrder = appData.sortOrder === 'asc' ? 'desc' : 'asc'; }
else { appData.sortField = field; appData.sortOrder = 'asc'; }
appData.filteredData.sort((a, b) => { const aVal = a[field] || ''; const bVal = b[field] || ''; if (appData.sortOrder === 'asc') return aVal > bVal ? 1 : -1; return aVal < bVal ? 1 : -1; });
renderTable();
}

function renderTable() {
const tbody = document.getElementById('tableBody');
if (!tbody) return;
const start = (appData.currentPage - 1) * appData.pageSize;
const end = start + appData.pageSize;
const pageData = appData.filteredData.slice(start, end);
tbody.innerHTML = pageData.map(row => {
const result = row['回访结果'] || '';
const resultClass = result === '解决' ? 'badge-success' : result === '未解决' ? 'badge-danger' : 'badge-warning';
return '<tr><td>' + (row['日期'] || '') + '</td><td>' + (row['会话ID'] || '') + '</td><td>' + (row['运单号'] || '') + '</td><td>' + (row['工号'] || '') + '</td><td><span class="badge ' + resultClass + '">' + result + '</span></td><td>' + (row['进线时间'] || '') + '</td><td>' + (row['问题类型'] || '') + '</td><td>' + (row['会话中介'] || '') + '</td><td>' + (row['回访手机号'] || '') + '</td></tr>';
}).join('');
}

function renderPagination() {
const container = document.getElementById('pagination');
if (!container) return;
const total = appData.filteredData.length;
const totalPages = Math.ceil(total / appData.pageSize) || 1;
let html = '<span class="page-info">共 ' + total + ' 条，' + appData.currentPage + '/' + totalPages + ' 页</span>';
html += '<button onclick="changePage(-1)" ' + (appData.currentPage === 1 ? 'disabled' : '') + '>上一页</button>';
for (let i = 1; i <= totalPages; i++) {
if (i === 1 || i === totalPages || (i >= appData.currentPage - 2 && i <= appData.currentPage + 2)) {
html += '<button class="' + (i === appData.currentPage ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
} else if (i === appData.currentPage - 3 || i === appData.currentPage + 3) { html += '<span>...</span>'; }
}
html += '<button onclick="changePage(1)" ' + (appData.currentPage === totalPages ? 'disabled' : '') + '>下一页</button>';
container.innerHTML = html;
}

function changePage(delta) {
const totalPages = Math.ceil(appData.filteredData.length / appData.pageSize);
appData.currentPage = Math.max(1, Math.min(totalPages, appData.currentPage + delta));
renderTable(); renderPagination();
}

function goPage(page) { appData.currentPage = page; renderTable(); renderPagination(); }

function exportData() {
if (!appData.rawData.length) { alert('暂无数据'); return; }

XLSX.utils.book_append_sheet(wb, ws, '外呼数据');

function renderRepeatAnalysis() {
const list = document.getElementById('repeatTypeList');
if (!list) return;
const typeStats = {};
const phoneGroups = {};
appData.rawData.forEach(d => {
const key = d['回访手机号'] || d['运单号'];
const type = d['问题类型'] || '未知';
if (!key) return;
if (!phoneGroups[key]) phoneGroups[key] = { count: 0, types: [] };
phoneGroups[key].count++;
phoneGroups[key].types.push(type);
});
Object.values(phoneGroups).forEach(group => {
if (group.count > 1) { group.types.forEach(type => { if (!typeStats[type]) typeStats[type] = { repeat: 0, total: 0 }; typeStats[type].repeat++; }); }
});
appData.rawData.forEach(d => { const type = d['问题类型'] || '未知'; if (!typeStats[type]) typeStats[type] = { repeat: 0, total: 0 }; typeStats[type].total++; });
const sorted = Object.entries(typeStats).map(([type, stats]) => ({ type, rate: stats.total ? ((stats.repeat / stats.total) * 100).toFixed(1) : 0, repeat: stats.repeat, total: stats.total })).sort((a, b) => b.rate - a.rate).slice(0, 5);
list.innerHTML = sorted.map((item, idx) => { const rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : ''; return '<li><span><span class="rank ' + rankClass + '">' + (idx + 1) + '</span> ' + item.type + '</span><span>重复率 ' + item.rate + '% (' + item.repeat + '/' + item.total + ')</span></li>'; }).join('');
}

function renderAgentEffect() {
const list = document.getElementById('agentEffectList');
if (!list) return;
const agentStats = {};
appData.rawData.forEach(d => { const agent = d['工号'] || '未知'; if (!agentStats[agent]) agentStats[agent] = { total: 0, resolved: 0 }; agentStats[agent].total++; if (d['回访结果'] === '解决') agentStats[agent].resolved++; });
const sorted = Object.entries(agentStats).map(([agent, stats]) => ({ agent, rate: stats.total ? ((stats.resolved / stats.total) * 100).toFixed(1) : 0, total: stats.total })).filter(a => a.total >= 2).sort((a, b) => b.rate - a.rate).slice(0, 5);
list.innerHTML = sorted.map((item, idx) => { const rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : ''; return '<li><span><span class="rank ' + rankClass + '">' + (idx + 1) + '</span> 工号 ' + item.agent + '</span><span>解决率 ' + item.rate + '% (' + item.total + '单)</span></li>'; }).join('');
}
